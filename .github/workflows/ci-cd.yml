name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run tests (if any)
        run: npm test || echo "No tests yet"

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy message
        run: echo "Deploy stage here (AWS/Docker/Render etc)"